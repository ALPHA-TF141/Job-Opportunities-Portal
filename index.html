<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Opportunities Portal</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

    <header>
        <nav class="navbar">

            <h2>Job Portal</h2>

            <div class="controls">

                <input type="text" id="searchInput" placeholder="Search Jobs..." aria-label="Search Jobs">

                <select id="locationFilter" aria-label="Filter by Location">
                    <option value="">All Locations</option>
                </select>

                <select id="companyFilter" aria-label="Filter by Company">
                    <option value="">All Companies</option>
                </select>

                <button id="darkModeBtn" aria-label="Toggle Dark Mode">
                    🌙
                </button>

            </div>

        </nav>
    </header>

    <main>

        <section id="jobsContainer">

        </section>

        <div id="pagination">

            <button id="prevBtn">
                Previous
            </button>

            <span id="pageNumber">
                1
            </span>

            <button id="nextBtn">
                Next
            </button>

        </div>

    </main>

    <script src="js/app.js"></script>

</body>

</html>
